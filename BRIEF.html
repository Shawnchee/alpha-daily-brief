<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>
<script src="insights.js"></script>
<style>
:root{--bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEEDE8;--border:#E0DED6;--border2:#C8C6BC;--text:#18170F;--muted:#68665A;--faint:#9A9888;--green:#1A6B3C;--green-bg:#E8F5EE;--red:#B83028;--red-bg:#FAEAEA;--amber:#8A5800;--amber-bg:#FFF4DC;--blue:#1A3A8A;--blue-bg:#EAF0FA;--purple:#5A1A8A;--purple-bg:#F2EAFA;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;--r:4px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.topbar{background:var(--text);color:#fff;padding:11px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.topbar-session{font-family:var(--mono);font-size:11px;opacity:.5}
.topbar-mood{font-size:12px;opacity:.7;max-width:480px;text-align:right}
.tab-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;position:sticky;top:44px;z-index:99}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:11px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.02em}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.page{max-width:1100px;margin:0 auto;padding:1.75rem 1.5rem 4rem}
.section{margin-bottom:2rem}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:6px;border-bottom:.5px solid var(--border2)}
.section-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.section-num{font-family:var(--mono);font-size:11px;color:var(--faint)}
.divider{height:.5px;background:var(--border);margin:1.75rem 0}
.verdict{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--text);padding:14px 18px;border-radius:0 var(--r) var(--r) 0;font-size:13px;line-height:1.75;margin-top:1rem}
.verdict.bull{border-left-color:var(--green)}
.verdict.bear{border-left-color:var(--red)}
.verdict.neutral{border-left-color:var(--amber)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.metric-label{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.metric-value{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1.2}
.metric-change{font-family:var(--mono);font-size:12px;margin-top:2px}
.metric-signal{font-size:11px;color:var(--muted);margin-top:6px;border-top:.5px solid var(--border);padding-top:6px;line-height:1.4}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.crypto-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:8px;margin-bottom:8px}
.crypto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.crypto-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.crypto-name{font-weight:600;font-size:15px}
.crypto-symbol{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:1px}
.crypto-price{font-family:var(--mono);font-size:19px;font-weight:500}
.crypto-changes{display:flex;gap:6px;justify-content:flex-end;margin-top:3px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:2px}
.pill.up{background:var(--green-bg);color:var(--green)}
.pill.down{background:var(--red-bg);color:var(--red)}
.pill.flat{background:var(--surface2);color:var(--muted)}
.crypto-insight{font-size:12px;line-height:1.7;color:var(--muted);border-top:.5px solid var(--border);padding-top:10px;margin-top:4px}
.dom-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.dom-label{font-family:var(--mono);font-size:11px;color:var(--faint);text-transform:uppercase;min-width:120px}
.dom-track{flex:1;min-width:160px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.dom-fill{height:100%;background:var(--text);border-radius:3px}
.dom-val{font-family:var(--mono);font-size:14px;font-weight:500;min-width:50px;text-align:right}
.dom-signal{font-size:12px;color:var(--muted);flex:1;min-width:160px}
.meme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.meme-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.meme-name{font-weight:600;font-size:13px}
.meme-chg{font-family:var(--mono);font-size:18px;font-weight:500;margin:3px 0}
.meme-note{font-size:11px;color:var(--muted);line-height:1.4}
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-size:13px}
.tbl thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
.tbl th{padding:8px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-family:var(--mono)}
.tbl th.r,.tbl td.r{text-align:right}
.tbl tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl td{padding:9px 14px;vertical-align:top}
.ticker{font-family:var(--mono);font-weight:500;font-size:13px}
.ticker-name{font-size:11px;color:var(--faint);margin-top:1px}
.price{font-family:var(--mono);font-size:13px;font-weight:500}
.chg{font-family:var(--mono);font-size:12px}
.note{font-size:11px;color:var(--muted);line-height:1.5;max-width:300px}
.flag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:2px;font-family:var(--mono);display:inline-block;margin-top:3px}
.flag-earn{background:var(--amber-bg);color:var(--amber)}
.flag-hot{background:var(--red-bg);color:var(--red)}
.flag-watch{background:var(--blue-bg);color:var(--blue)}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:8px}
.idx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.idx-name{font-size:11px;color:var(--faint);font-family:var(--mono);text-transform:uppercase}
.idx-val{font-family:var(--mono);font-size:17px;font-weight:500;margin:3px 0}
.idx-chg{font-family:var(--mono);font-size:12px}
.trending{display:flex;flex-wrap:wrap;gap:7px}
.t-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;font-family:var(--mono);font-size:12px}
.t-tick{font-weight:500}
.klci-hero{background:var(--text);color:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:8px}
.klci-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.klci-val{font-family:var(--mono);font-size:34px;font-weight:500;letter-spacing:-1px;margin:4px 0}
.klci-chg{font-family:var(--mono);font-size:14px;opacity:.65}
.klci-ctx{font-size:12px;opacity:.55;margin-top:8px;line-height:1.5}
.forex-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.forex-pair{font-family:var(--mono);font-size:13px;font-weight:500}
.forex-rate{font-family:var(--mono);font-size:20px;font-weight:500}
.forex-sig{font-size:12px;color:var(--muted);flex:1;text-align:right}
.ipo-list{display:flex;flex-direction:column;gap:8px}
.ipo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.ipo-name{font-weight:600;font-size:14px}
.ipo-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.ipo-note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
.ipo-price{font-family:var(--mono);font-size:16px;font-weight:500;text-align:right}
.ipo-status{font-size:10px;font-weight:600;padding:3px 8px;border-radius:2px;font-family:var(--mono);display:inline-block;margin-top:6px}
.s-open{background:var(--green-bg);color:var(--green)}
.s-upcoming{background:var(--amber-bg);color:var(--amber)}
.s-listed{background:var(--surface2);color:var(--muted)}
.news-list{display:flex;flex-direction:column;gap:8px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px}
.news-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:5px}
.news-hl{font-weight:500;font-size:13px;line-height:1.5;flex:1}
.sent{font-size:10px;font-weight:600;padding:3px 8px;border-radius:2px;font-family:var(--mono);letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.sent-bull{background:var(--green-bg);color:var(--green)}
.sent-bear{background:var(--red-bg);color:var(--red)}
.sent-neu{background:var(--surface2);color:var(--muted)}
.sent-watch{background:var(--amber-bg);color:var(--amber)}
.news-src{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:8px}
.news-meaning{font-size:12px;color:var(--text);line-height:1.6;background:var(--surface2);padding:8px 12px;border-radius:2px;border-left:2px solid var(--border2)}
.news-meaning strong{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:2px;font-family:var(--mono)}
.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.ins-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ins-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ins-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.tf-tabs{display:flex;border-bottom:1px solid var(--border)}
.tf-btn{flex:1;padding:8px;font-size:11px;font-weight:500;font-family:var(--mono);background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .1s}
.tf-btn.active{color:var(--text);border-bottom-color:var(--text);background:var(--surface)}
.tf-body{display:none;padding:14px 16px;font-size:13px;line-height:1.8;color:var(--muted)}
.tf-body.active{display:block}
.action-tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:2px;font-family:var(--mono);letter-spacing:.05em;margin-bottom:8px}
.act-buy{background:var(--green-bg);color:var(--green)}
.act-sell{background:var(--red-bg);color:var(--red)}
.act-hold{background:var(--amber-bg);color:var(--amber)}
.act-watch{background:var(--blue-bg);color:var(--blue)}
.perps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:12px}
.perp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.perp-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.perp-asset{font-size:16px;font-weight:700}
.perp-sym{font-family:var(--mono);font-size:12px;color:var(--faint)}
.perp-dir{font-size:12px;font-weight:700;padding:5px 14px;border-radius:2px;font-family:var(--mono);letter-spacing:.08em}
.dir-long{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.dir-short{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.perp-body{padding:16px 18px}
.perp-cur{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:14px}
.perp-cur span{color:var(--text);font-weight:500}
.perp-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.perp-lvl{background:var(--surface2);border-radius:var(--r);padding:10px 12px}
.lvl-lbl{font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.lvl-val{font-family:var(--mono);font-size:14px;font-weight:500}
.lvl-pct{font-family:var(--mono);font-size:11px;margin-top:1px}
.lbl-entry{color:var(--muted)}
.lbl-tp{color:var(--green)}
.lbl-sl{color:var(--red)}
.perp-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pbadge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:2px;font-family:var(--mono)}
.pb-lev{background:var(--purple-bg);color:var(--purple)}
.pb-rr{background:var(--blue-bg);color:var(--blue)}
.pb-hi{background:var(--green-bg);color:var(--green)}
.pb-med{background:var(--amber-bg);color:var(--amber)}
.pb-lo{background:var(--red-bg);color:var(--red)}
.pb-min{background:var(--surface2);color:var(--muted)}
.perp-reasoning{font-size:12px;line-height:1.75;color:var(--muted);border-top:.5px solid var(--border);padding-top:12px}
.disclaimer{margin-top:1.5rem;font-size:11px;color:var(--faint);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;line-height:1.6}
.no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;gap:10px}
.no-data h2{font-size:18px;font-weight:600}
.no-data p{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--text);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-family:var(--mono);font-size:11px;color:var(--faint)}
.pivot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:1rem}
.pivot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pivot-card-header{background:var(--surface2);padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);border-bottom:1px solid var(--border)}
.pivot-table{width:100%;border-collapse:collapse;font-size:13px}
.pivot-table tr{border-bottom:.5px solid var(--border)}
.pivot-table tr:last-child{border-bottom:none}
.pivot-table td{padding:9px 16px;font-family:var(--mono)}
.pivot-table td:first-child{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.04em;width:40%}
.pivot-table td:last-child{font-weight:500;text-align:right}
.piv-r{color:var(--red)}.piv-s{color:var(--green)}.piv-p{color:var(--text)}
.tv-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem}
.tv-header{background:var(--surface2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tv-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.tv-badge{font-family:var(--mono);font-size:10px;color:var(--faint)}
.gold-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:1.5rem}
.gold-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.gold-stat-label{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.gold-stat-val{font-family:var(--mono);font-size:18px;font-weight:500}
.gold-stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
@media(max-width:600px){.topbar{padding:10px 14px}.tab-nav{padding:0 14px}.page{padding:1.25rem 1rem 3rem}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Alpha Daily Brief</span>
    <span class="topbar-session" id="top-meta">—</span>
  </div>
  <div class="topbar-mood" id="top-mood">Loading...</div>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('overview',this)">◈ Overview</button>
  <button class="tab-btn" onclick="switchTab('crypto',this)">₿ Crypto</button>
  <button class="tab-btn" onclick="switchTab('us',this)">◎ US Markets</button>
  <button class="tab-btn" onclick="switchTab('malaysia',this)">◇ Malaysia</button>
  <button class="tab-btn" onclick="switchTab('insights',this)">◉ Insights</button>
  <button class="tab-btn" onclick="switchTab('perps',this)">⚡ Perps</button>
  <button class="tab-btn" onclick="switchTab('gold',this)">◆ Gold</button>
</nav>

<div id="tab-overview" class="tab-content active"><div class="page" id="r-overview"></div></div>
<div id="tab-crypto"   class="tab-content"><div class="page" id="r-crypto"></div></div>
<div id="tab-us"       class="tab-content"><div class="page" id="r-us"></div></div>
<div id="tab-malaysia" class="tab-content"><div class="page" id="r-malaysia"></div></div>
<div id="tab-insights" class="tab-content"><div class="page" id="r-insights"></div></div>
<div id="tab-perps"    class="tab-content"><div class="page" id="r-perps"></div></div>
<div id="tab-gold" class="tab-content">
  <div class="page">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Gold Futures (XAU/USD) — Technical Analysis</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto">Powered by TradingView</span>
      </div>
      <div class="tv-wrap">
        <div class="tv-header">
          <span class="tv-title">Oscillators &amp; Moving Averages</span>
          <span class="tv-badge">COMEX: GC1! · Live</span>
        </div>
        <div class="tradingview-widget-container" style="padding:0">
          <div class="tradingview-widget-container__widget"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
          {"interval":"1D","width":"100%","isTransparent":true,"height":"500","symbol":"COMEX:GC1!","showIntervalTabs":true,"displayMode":"multiple","locale":"en","colorTheme":"light"}
          </script>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section">
      <div class="section-header"><span class="section-title">Pivot Points</span><span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto">Updated daily by routine</span></div>
      <div id="r-gold-pivots">
        <div class="no-data" style="min-height:200px"><div class="pulse"></div><p style="color:var(--faint);font-family:var(--mono);font-size:11px">Pivot data loads after 7:00 AM KL routine run</p></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section">
      <div class="section-header"><span class="section-title">Gold Price Summary</span></div>
      <div id="r-gold-summary">
        <div class="no-data" style="min-height:120px"><div class="pulse"></div><p style="color:var(--faint);font-family:var(--mono);font-size:11px">Loads after routine run</p></div>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0,0);
}
function switchTf(uid,tf,btn){
  ['today','week','month'].forEach(t=>{const e=document.getElementById(uid+'-'+t);if(e)e.classList.remove('active');});
  btn.parentElement.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  const t=document.getElementById(uid+'-'+tf);
  if(t)t.classList.add('active');
  btn.classList.add('active');
}
function cc(v){if(v==null||v==='')return'flat';const n=parseFloat(String(v).replace(/[%+]/g,''));if(isNaN(n)||n===0)return'flat';return n>0?'up':'down';}
function fc(v){if(v==null||v==='')return'—';const s=String(v);const n=parseFloat(s.replace(/[%+]/g,''));if(isNaN(n))return s;return(n>0?'+':'')+n.toFixed(2)+(s.includes('%')?'%':'');}
function sc(s){const v=(s||'').toLowerCase();if(v.includes('bull'))return'sent-bull';if(v.includes('bear'))return'sent-bear';if(v.includes('watch'))return'sent-watch';return'sent-neu';}
function vc(t){const s=(t||'').toLowerCase();const b=(s.match(/bull|buy|upside|break|opportun|positive|strong/g)||[]).length;const r=(s.match(/bear|sell|risk|caution|down|weak|pressure/g)||[]).length;if(b>r)return'bull';if(r>b)return'bear';return'neutral';}
function acCls(a){const v=(a||'').toLowerCase();if(v.includes('buy')||v.includes('long')||v.includes('add'))return'act-buy';if(v.includes('sell')||v.includes('short')||v.includes('exit')||v.includes('reduce'))return'act-sell';if(v.includes('hold'))return'act-hold';return'act-watch';}
function confCls(c){const v=(c||'').toLowerCase();if(v==='high')return'pb-hi';if(v==='medium'||v==='med')return'pb-med';return'pb-lo';}

function renderOverview(d){
  const m=d.macro||{};
  const items=[{k:'dxy',l:'DXY'},{k:'gold',l:'Gold'},{k:'oil',l:'Crude Oil'},{k:'silver',l:'Silver'},{k:'yield10y',l:'10Y Yield'},{k:'vix',l:'VIX'},{k:'usdmyr',l:'USD/MYR'},{k:'sp500',l:'S&P 500'}];
  const cards=items.filter(i=>m[i.k]).map(i=>{const x=m[i.k];return`<div class="metric-card"><div class="metric-label">${i.l}</div><div class="metric-value ${cc(x.change)}">${x.value||'—'}</div><div class="metric-change ${cc(x.change)}">${fc(x.change)}</div>${x.signal?`<div class="metric-signal">${x.signal}</div>`:''}</div>`;}).join('');
  const news=(d.news||[]).map(n=>`<div class="news-card"><div class="news-top"><div class="news-hl">${n.headline||''}</div><span class="sent ${sc(n.sentiment)}">${(n.sentiment||'').toUpperCase()}</span></div><div class="news-src">${n.source||''}${n.time?' · '+n.time:''}</div>${n.meaning?`<div class="news-meaning"><strong>What to do</strong>${n.meaning}</div>`:''}</div>`).join('');
  return`<div class="section"><div class="section-header"><span class="section-num">01</span><span class="section-title">Macro Pulse</span></div><div class="metric-grid">${cards}</div>${m.verdict?`<div class="verdict ${vc(m.verdict)}">${m.verdict}</div>`:''}</div><div class="divider"></div><div class="section"><div class="section-header"><span class="section-num">02</span><span class="section-title">News That Moves Markets</span></div><div class="news-list">${news}</div></div><div class="footer"><div>Alpha Daily Brief · ${d.generated||'—'} · ${d.session||'Morning'}</div><div>${d.nextRun?'Next: '+d.nextRun:''}</div></div>`;
}

function renderCrypto(d){
  const c=d.crypto||{};
  const dom=c.dominance?`<div class="dom-row"><div class="dom-label">BTC Dominance</div><div class="dom-track"><div class="dom-fill" style="width:${Math.min(parseFloat(c.dominance.value)||50,100)}%"></div></div><div class="dom-val ${cc(c.dominance.change)}">${c.dominance.value}%</div><div class="dom-signal">${c.dominance.signal||''}</div></div>`:'';
  const coins=(c.main||[]).map(x=>`<div class="crypto-card"><div class="crypto-top"><div><div class="crypto-name">${x.name}</div><div class="crypto-symbol">${x.symbol||''} ${x.marketCap?'· '+x.marketCap:''}</div></div><div><div class="crypto-price ${cc(x.change24h)}">${x.price}</div><div class="crypto-changes">${x.change1h!=null?`<span class="pill ${cc(x.change1h)}">1h ${fc(x.change1h)}%</span>`:''}<span class="pill ${cc(x.change24h)}">24h ${fc(x.change24h)}%</span>${x.change7d!=null?`<span class="pill ${cc(x.change7d)}">7d ${fc(x.change7d)}%</span>`:''}</div></div></div>${x.insight?`<div class="crypto-insight">${x.insight}</div>`:''}</div>`).join('');
  const memes=(c.memecoins||[]).length?`<div class="section-header" style="margin-top:1.25rem;"><span class="section-title" style="font-size:10px;">Memecoin Radar</span></div><div class="meme-grid">${(c.memecoins||[]).map(m=>`<div class="meme-card"><div class="meme-name">${m.name} <span style="font-weight:400;color:var(--faint);font-size:11px;">${m.symbol||''}</span></div><div class="meme-chg ${cc(m.change24h)}">${fc(m.change24h)}%</div>${m.price?`<div style="font-family:var(--mono);font-size:11px;color:var(--muted);">${m.price}</div>`:''} ${m.note?`<div class="meme-note">${m.note}</div>`:''}</div>`).join('')}</div>`:'';
  return`<div class="section"><div class="section-header"><span class="section-num">01</span><span class="section-title">Crypto Market</span></div>${dom}<div class="crypto-grid">${coins}</div>${memes}${c.verdict?`<div class="verdict ${vc(c.verdict)}">${c.verdict}</div>`:''}</div>`;
}

function renderUS(d){
  const u=d.usMarkets||{};
  const idx=(u.indices||[]).map(i=>`<div class="idx-card"><div class="idx-name">${i.name}</div><div class="idx-val ${cc(i.change)}">${i.value}</div><div class="idx-chg ${cc(i.change)}">${fc(i.change)}</div></div>`).join('');
  const etfRows=(u.etfs||[]).map(s=>`<tr><td><div class="ticker">${s.ticker}</div><div class="ticker-name">${s.name||''}</div></td><td class="r"><div class="price">${s.price||'—'}</div></td><td class="r"><div class="chg ${cc(s.change)}">${fc(s.change)}</div></td><td><div class="note">${s.insight||''}</div></td></tr>`).join('');
  const stkRows=(u.stocks||[]).map(s=>`<tr><td><div class="ticker">${s.ticker}</div><div class="ticker-name">${s.name||''}</div>${s.notable?'<span class="flag flag-hot">Notable</span>':''}</td><td class="r"><div class="price">${s.price||'—'}</div></td><td class="r"><div class="chg ${cc(s.change)}">${fc(s.change)}</div></td><td><div class="note">${s.insight||''}</div></td></tr>`).join('');
  const trend=(u.trending||[]).length?`<div style="margin-top:1rem;"><div class="section-header" style="margin-bottom:.75rem;"><span class="section-title" style="font-size:10px;">Trending Today</span></div><div class="trending">${(u.trending||[]).map(t=>`<div class="t-pill"><span class="t-tick">${t.ticker}</span><span class="${cc(t.change)}">${fc(t.change)}</span></div>`).join('')}</div></div>`:'';
  return`<div class="section"><div class="section-header"><span class="section-num">01</span><span class="section-title">Indices</span></div><div class="idx-grid">${idx}</div></div><div class="divider"></div><div class="section"><div class="section-header"><span class="section-num">02</span><span class="section-title">ETF Watchlist</span></div><table class="tbl"><thead><tr><th>ETF</th><th class="r">Price</th><th class="r">Chg</th><th>Read</th></tr></thead><tbody>${etfRows}</tbody></table></div><div class="divider"></div><div class="section"><div class="section-header"><span class="section-num">03</span><span class="section-title">Stocks Watchlist</span></div><table class="tbl"><thead><tr><th>Stock</th><th class="r">Price</th><th class="r">Chg</th><th>Read</th></tr></thead><tbody>${stkRows}</tbody></table>${trend}${u.verdict?`<div class="verdict ${vc(u.verdict)}">${u.verdict}</div>`:''}</div>`;
}

function renderMalaysia(d){
  const my=d.malaysia||{};
  const klci=my.klci?`<div class="klci-hero"><div class="klci-lbl">FTSE Bursa Malaysia KLCI</div><div class="klci-val">${my.klci.value}</div><div class="klci-chg">${fc(my.klci.change)} today</div>${my.klci.context?`<div class="klci-ctx">${my.klci.context}</div>`:''}</div>`:'';
  const forex=my.usdmyr?`<div class="forex-row"><div class="forex-pair">USD / MYR</div><div class="forex-rate ${cc(my.usdmyr.change)}">${my.usdmyr.value}</div><div class="forex-sig">${my.usdmyr.signal||''}</div></div>`:'';
  const myRows=(my.stocks||[]).map(s=>`<tr><td><div class="ticker">${s.ticker}</div><div class="ticker-name">${s.name||''}</div></td><td class="r"><div class="price">RM ${s.price||'—'}</div></td><td class="r"><div class="chg ${cc(s.change)}">${fc(s.change)}</div></td><td><div class="note">${s.insight||''}</div></td></tr>`).join('');
  const ipos=(my.ipos||[]).length?`<div class="divider"></div><div class="section"><div class="section-header"><span class="section-title">IPO Watch</span></div><div class="ipo-list">${(my.ipos||[]).map(i=>`<div class="ipo-card"><div><div class="ipo-name">${i.name}</div><div class="ipo-meta">${i.sector||''}${i.listingDate?' · Listing '+i.listingDate:''}</div>${i.note?`<div class="ipo-note">${i.note}</div>`:''}</div><div>${i.price?`<div class="ipo-price">RM ${i.price}</div>`:''}<span class="ipo-status s-${(i.status||'upcoming').toLowerCase()}">${i.status||'Upcoming'}</span></div></div>`).join('')}</div></div>`:'';
  return`<div class="section"><div class="section-header"><span class="section-num">01</span><span class="section-title">KLCI & Ringgit</span></div>${klci}${forex}</div><div class="divider"></div><div class="section"><div class="section-header"><span class="section-num">02</span><span class="section-title">Malaysia Stocks</span></div><table class="tbl"><thead><tr><th>Stock</th><th class="r">Price</th><th class="r">Chg</th><th>Read</th></tr></thead><tbody>${myRows}</tbody></table>${my.verdict?`<div class="verdict ${vc(my.verdict)}">${my.verdict}</div>`:''}</div>${ipos}`;
}

function renderInsights(d){
  const ins=d.insights||{};
  const mkts=[{k:'crypto',l:'Crypto',ic:'₿'},{k:'usStocks',l:'US Stocks',ic:'◎'},{k:'etfs',l:'ETFs',ic:'◈'},{k:'malaysia',l:'Malaysia',ic:'◇'}];
  const cards=mkts.filter(m=>ins[m.k]).map(m=>{
    const x=ins[m.k];const uid='ins-'+m.k;
    return`<div class="ins-card"><div class="ins-header"><span style="font-size:15px;">${m.ic}</span><span class="ins-title">${m.l}</span></div><div class="tf-tabs"><button class="tf-btn active" onclick="switchTf('${uid}','today',this)">Today</button><button class="tf-btn" onclick="switchTf('${uid}','week',this)">This Week</button><button class="tf-btn" onclick="switchTf('${uid}','month',this)">This Month</button></div><div id="${uid}-today" class="tf-body active">${x.todayAction?`<span class="action-tag ${acCls(x.todayAction)}">${x.todayAction.toUpperCase()}</span><br>`:''}<div>${x.today||'No data.'}</div></div><div id="${uid}-week" class="tf-body">${x.weekAction?`<span class="action-tag ${acCls(x.weekAction)}">${x.weekAction.toUpperCase()}</span><br>`:''}<div>${x.thisWeek||'No data.'}</div></div><div id="${uid}-month" class="tf-body">${x.monthAction?`<span class="action-tag ${acCls(x.monthAction)}">${x.monthAction.toUpperCase()}</span><br>`:''}<div>${x.thisMonth||'No data.'}</div></div></div>`;
  }).join('');
  return`<div class="section"><div class="section-header"><span class="section-title">Actionable Insights</span></div><p style="font-size:12px;color:var(--muted);margin-bottom:1rem;">Direct calls — what to do, not just what happened.</p><div class="insights-grid">${cards}</div></div>`;
}

function renderPerps(d){
  const perps=d.perps||[];
  if(!perps.length)return`<div class="no-data"><div class="pulse"></div><h2>No perps data</h2><p>Run the routine to generate trade setups.</p></div>`;
  const cards=perps.map(p=>{
    const long=(p.direction||'').toUpperCase()==='LONG';
    return`<div class="perp-card"><div class="perp-header"><div><div class="perp-asset">${p.asset}</div><div class="perp-sym">${p.symbol||''} Perpetuals</div></div><div class="perp-dir ${long?'dir-long':'dir-short'}">${(p.direction||'').toUpperCase()}</div></div><div class="perp-body"><div class="perp-cur">Current: <span>${p.currentPrice||'—'}</span></div><div class="perp-levels"><div class="perp-lvl"><div class="lvl-lbl lbl-entry">Entry</div><div class="lvl-val">${p.entry||'—'}</div></div><div class="perp-lvl"><div class="lvl-lbl lbl-tp">TP 1</div><div class="lvl-val">${p.tp1?p.tp1.price:'—'}</div><div class="lvl-pct up">${p.tp1?p.tp1.pct:''}</div></div><div class="perp-lvl"><div class="lvl-lbl lbl-tp">TP 2</div><div class="lvl-val">${p.tp2?p.tp2.price:'—'}</div><div class="lvl-pct up">${p.tp2?p.tp2.pct:''}</div></div><div class="perp-lvl"><div class="lvl-lbl lbl-sl">Stop Loss</div><div class="lvl-val">${p.sl?p.sl.price:'—'}</div><div class="lvl-pct down">${p.sl?p.sl.pct:''}</div></div></div><div class="perp-meta"><span class="pbadge pb-lev">🔧 ${p.leverage||'—'}</span><span class="pbadge pb-rr">R:R ${p.riskReward||'—'}</span><span class="pbadge ${confCls(p.confidence)}">${(p.confidence||'—').toUpperCase()}</span><span class="pbadge pb-min">Min $${p.minUSD||'10'}</span></div><div class="perp-reasoning">${p.reasoning||''}</div></div></div>`;
  }).join('');
  return`<div class="section"><div class="section-header"><span class="section-title">Perps Trade Setups — BTC · ETH · SOL</span></div><div class="perps-grid">${cards}</div><div class="disclaimer">⚠️ AI-generated setups based on available market data. Not financial advice. Always use your own judgment and manage risk accordingly. These are suggestions only.</div></div>`;
}

function renderGold(d){
  const g=d.goldPivots||{};
  if(!g.classic&&!g.fibonacci)return;

  // Summary stats
  const stats=d.goldSummary||{};
  const summaryHtml=Object.keys(stats).length?`
    <div class="gold-summary">
      ${Object.entries(stats).map(([k,v])=>`
        <div class="gold-stat">
          <div class="gold-stat-label">${k}</div>
          <div class="gold-stat-val ${cc(v.change)}">${v.value||'—'}</div>
          <div class="gold-stat-sub">${v.note||''}</div>
        </div>`).join('')}
    </div>` : '';

  // Pivot tables
  function pivotTable(label,rows){
    if(!rows||!rows.length)return'';
    return`<div class="pivot-card">
      <div class="pivot-card-header">${label}</div>
      <table class="pivot-table">
        ${rows.map(r=>`<tr>
          <td>${r.label}</td>
          <td class="${r.label.startsWith('R')?'piv-r':r.label.startsWith('S')?'piv-s':'piv-p'}">${r.value||'—'}</td>
        </tr>`).join('')}
      </table>
    </div>`;
  }

  const classic=g.classic||[];
  const fib=g.fibonacci||[];
  const cam=g.camarilla||[];

  document.getElementById('r-gold-pivots').innerHTML=`
    <div class="pivot-grid">
      ${pivotTable('Classic Pivots',classic)}
      ${pivotTable('Fibonacci Pivots',fib)}
      ${cam.length?pivotTable('Camarilla Pivots',cam):''}
    </div>
    ${g.note?`<div style="font-size:12px;color:var(--muted);margin-top:8px;font-family:var(--mono)">${g.note}</div>`:''}`;

  if(summaryHtml){
    document.getElementById('r-gold-summary').innerHTML=summaryHtml;
  }
}

function init(){
  const d=window.CRUCIX_DATA;
  const ins=window.CRUCIX_INSIGHTS||{};
  const tabs=['overview','crypto','us','malaysia','insights','perps'];
  if(!d){
    tabs.forEach(id=>{document.getElementById('r-'+id).innerHTML=`<div class="no-data"><div class="pulse"></div><h2>Awaiting first run</h2><p>The routine will populate this at 7:00 AM KL time.</p></div>`;});
    return;
  }
  document.getElementById('top-meta').textContent=(d.session||'Morning')+' · '+(d.generated||'');
  document.getElementById('top-mood').textContent=d.mood||'';
  document.getElementById('r-overview').innerHTML=renderOverview(d);
  document.getElementById('r-crypto').innerHTML=renderCrypto(d);
  document.getElementById('r-us').innerHTML=renderUS(d);
  document.getElementById('r-malaysia').innerHTML=renderMalaysia(d);
  const insData = {...d, insights: ins.insights||d.insights||{}, perps: ins.perps||d.perps||[] };
  document.getElementById('r-insights').innerHTML=renderInsights(insData);
  document.getElementById('r-perps').innerHTML=renderPerps(insData);
  renderGold(d);
}
window.addEventListener('DOMContentLoaded',init);
</script>
